<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rock · Paper · Scissors — Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080808;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --muted: #666;
    --red: #e84040;
    --blue: #3a9ff5;
    --gold: #f5c842;
    --green: #3dca7e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 520px; }

  /* ─── LOGO ─── */
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 6px;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, #888 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo p {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
  }

  /* ─── LOBBY ─── */
  .lobby-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .lobby-btn {
    padding: 20px 12px;
    border-radius: 14px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.12s;
    text-align: center;
  }
  .lobby-btn small {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 400;
  }
  .lobby-btn:hover { background: #222; border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }
  .lobby-btn.primary { border-color: var(--red); }
  .lobby-btn.primary:hover { background: #1a0a0a; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider span { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  .join-row {
    display: flex;
    gap: 10px;
  }
  .code-input {
    flex: 1;
    padding: 14px 18px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.15s;
  }
  .code-input::placeholder { color: var(--muted); letter-spacing: 3px; }
  .code-input:focus { border-color: var(--blue); }

  .join-btn {
    padding: 14px 24px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.15s, transform 0.12s;
  }
  .join-btn:hover { background: #5aafff; transform: translateY(-1px); }

  /* ─── WAITING / STATUS ─── */
  .status-box {
    text-align: center;
    padding: 32px 24px;
  }
  .status-code {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 14px;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 12px;
    text-shadow: 0 0 40px rgba(245,200,66,0.3);
  }
  .status-label {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .status-msg {
    font-size: 14px;
    color: var(--muted);
  }
  .pulse {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    margin-right: 8px;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.4;transform:scale(0.7)}
  }

  /* ─── GAME ─── */
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .score-pill {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    overflow: hidden;
  }
  .score-side {
    padding: 8px 20px;
    text-align: center;
  }
  .score-side-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 1;
  }
  .score-side-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .score-side.you .score-side-num { color: var(--red); }
  .score-side.opp .score-side-num { color: var(--blue); }
  .score-vs {
    padding: 0 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: var(--muted);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    height: 100%;
    display: flex;
    align-items: center;
  }
  .round-tag {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* best of 3 dots */
  .bo3-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: transparent;
    transition: background 0.3s, border-color 0.3s;
  }
  .dot.you { background: var(--red); border-color: var(--red); }
  .dot.opp { background: var(--blue); border-color: var(--blue); }

  /* choice buttons */
  .choices {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .choice-btn {
    padding: 0;
    border: 1.5px solid var(--border2);
    border-radius: 16px;
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: transform 0.12s, border-color 0.15s, background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    font-family: 'DM Sans', sans-serif;
  }
  .choice-btn .icon { font-size: 48px; margin-bottom: 8px; pointer-events: none; }
  .choice-btn .label { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); pointer-events: none; }
  .choice-btn:hover:not(:disabled) { transform: translateY(-4px) scale(1.04); border-color: rgba(255,255,255,0.3); }
  .choice-btn.selected { border-color: var(--red); background: #1a0808; }
  .choice-btn:disabled { cursor: default; opacity: 0.4; }

  /* status bar below choices */
  .game-status {
    text-align: center;
    min-height: 28px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .game-status.ready { color: var(--green); }
  .game-status.opponent { color: var(--blue); }

  /* ─── ROUND RESULT ─── */
  .result-overlay {
    text-align: center;
    padding: 16px 0;
  }
  .result-icons {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 12px;
    font-size: 56px;
  }
  .result-vs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--muted);
  }
  .result-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  .result-text.win { color: var(--green); }
  .result-text.lose { color: var(--red); }
  .result-text.draw { color: var(--gold); }
  .result-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ─── GAME OVER ─── */
  .gameover {
    text-align: center;
    padding: 16px 0 8px;
  }
  .gameover-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 58px;
    letter-spacing: 6px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .gameover-title.win { color: var(--gold); text-shadow: 0 0 40px rgba(245,200,66,0.4); }
  .gameover-title.lose { color: var(--muted); }
  .gameover-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .rematch-btn {
    padding: 14px 40px;
    background: transparent;
    border: 1.5px solid var(--border2);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.12s;
  }
  .rematch-btn:hover { border-color: var(--gold); background: rgba(245,200,66,0.05); transform: translateY(-2px); }

  /* ─── ERROR ─── */
  .error-msg {
    color: var(--red);
    font-size: 13px;
    text-align: center;
    margin-top: 12px;
    min-height: 20px;
  }

  /* ─── COPY BUTTON ─── */
  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    margin-top: 12px;
  }
  .copy-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
  .copy-btn.copied { color: var(--green); border-color: var(--green); }

  /* animations */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim { animation: fadeSlideIn 0.35s ease; }

  @keyframes bounceIn {
    0%  { transform: scale(0.7); opacity: 0; }
    60% { transform: scale(1.08); opacity: 1; }
    100%{ transform: scale(1); }
  }
  .bounce { animation: bounceIn 0.4s ease; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>Rock · Paper · Scissors</h1>
    <p>Online Multiplayer · Best of 3</p>
  </div>

  <div class="card" id="screen-lobby">
    <div class="lobby-grid">
      <button class="lobby-btn primary" onclick="createRoom()">
        ✦ New Game
        <small>Get a room code</small>
      </button>
    </div>

    <div class="divider"><span>or join a friend</span></div>

    <div class="join-row">
      <input class="code-input" id="join-input" maxlength="4" placeholder="XXXX" oninput="this.value=this.value.toUpperCase()"/>
      <button class="join-btn" onclick="joinRoom()">Play →</button>
    </div>
    <div class="error-msg" id="lobby-error"></div>
  </div>

  <div class="card anim" id="screen-waiting" style="display:none">
    <div class="status-box">
      <div class="status-label">Your room code</div>
      <div class="status-code" id="waiting-code">----</div>
      <button class="copy-btn" id="copy-btn" onclick="copyCode()">
        📋 Copy code
      </button>
      <div style="margin-top:24px" class="status-msg">
        <span class="pulse"></span>Waiting for your friend to join…
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--muted)">Share the code above — they enter it and click Play!</div>
    </div>
  </div>

  <div class="card" id="screen-game" style="display:none">
    <div class="game-header">
      <div class="round-tag" id="round-label">Round 1</div>
      <div class="score-pill">
        <div class="score-side you">
          <div class="score-side-num" id="score-you">0</div>
          <div class="score-side-label">You</div>
        </div>
        <div class="score-vs">VS</div>
        <div class="score-side opp">
          <div class="score-side-num" id="score-opp">0</div>
          <div class="score-side-label">Them</div>
        </div>
      </div>
    </div>

    <div class="bo3-dots" id="bo3-dots">
      <div class="dot" id="dot0"></div>
      <div class="dot" id="dot1"></div>
      <div class="dot" id="dot2"></div>
    </div>

    <div id="game-inner">
      <div class="choices">
        <button class="choice-btn" data-choice="rock" onclick="pickChoice('rock')">
          <span class="icon">✊</span>
          <span class="label">Rock</span>
        </button>
        <button class="choice-btn" data-choice="paper" onclick="pickChoice('paper')">
          <span class="icon">✋</span>
          <span class="label">Paper</span>
        </button>
        <button class="choice-btn" data-choice="scissors" onclick="pickChoice('scissors')">
          <span class="icon">✌️</span>
          <span class="label">Scissors</span>
        </button>
      </div>
      <div class="game-status" id="game-status">Pick your move!</div>
    </div>
  </div>
</div>

<script>
const ICONS = { rock: '✊', paper: '✋', scissors: '✌️' };

let ws, myIndex, myChoice, roomCode;

function getWsUrl() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  return `${proto}://${location.host}`;
}

function connectWs() {
  ws = new WebSocket(getWsUrl());
  ws.onmessage = e => handleMessage(JSON.parse(e.data));
  ws.onclose = () => {
    if (document.getElementById('screen-game').style.display !== 'none') {
      showGameStatus('Connection lost. Please refresh.', '');
    }
  };
}

function send(data) { ws.send(JSON.stringify(data)); }

function show(id) {
  ['screen-lobby','screen-waiting','screen-game'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function createRoom() {
  connectWs();
  ws.onopen = () => send({ type: 'create' });
}

function joinRoom() {
  const code = document.getElementById('join-input').value.trim().toUpperCase();
  if (code.length !== 4) { showLobbyError('Enter the 4-letter room code!'); return; }
  connectWs();
  ws.onopen = () => send({ type: 'join', code });
}

function showLobbyError(msg) {
  document.getElementById('lobby-error').textContent = msg;
  setTimeout(() => document.getElementById('lobby-error').textContent = '', 3000);
}

function handleMessage(msg) {
  if (msg.type === 'created') {
    myIndex = 0;
    roomCode = msg.code;
    document.getElementById('waiting-code').textContent = msg.code;
    show('screen-waiting');
  }

  else if (msg.type === 'joined') {
    myIndex = 1;
    roomCode = msg.code;
  }

  else if (msg.type === 'error') {
    showLobbyError(msg.message);
  }

  else if (msg.type === 'start' || msg.type === 'rematch_start') {
    myChoice = null;
    updateScores(msg.scores);
    updateRound(msg.round);
    show('screen-game');
    renderChoices(false);
    showGameStatus('Pick your move!', '');
  }

  else if (msg.type === 'next_round') {
    myChoice = null;
    updateScores(msg.scores);
    updateRound(msg.round);
    renderChoices(false);
    showGameStatus('Pick your move!', '');
    document.getElementById('game-inner').innerHTML = buildChoicesHTML();
    document.getElementById('game-inner').classList.add('anim');
    bindChoiceButtons();
    showGameStatus('Pick your move!', '');
  }

  else if (msg.type === 'opponent_chose') {
    if (myChoice) {
      showGameStatus('Both ready — revealing…', 'ready');
    } else {
      showGameStatus('Opponent has chosen — your turn!', 'opponent');
    }
  }

  else if (msg.type === 'round_result') {
    showResult(msg);
    if (!msg.gameOver) return;
    setTimeout(() => showGameOver(msg), 1800);
  }

  else if (msg.type === 'opponent_left') {
    document.getElementById('game-inner').innerHTML = `
      <div class="result-overlay bounce">
        <div class="result-text draw">Opponent left</div>
        <div class="result-sub">The game has ended</div>
        <button class="rematch-btn" style="margin-top:20px" onclick="location.reload()">Back to lobby</button>
      </div>`;
  }

  else if (msg.type === 'rematch_waiting') {
    document.getElementById('game-inner').innerHTML = `
      <div class="result-overlay">
        <div class="result-text draw" style="font-size:22px">Waiting for opponent…</div>
      </div>`;
  }
}

function buildChoicesHTML() {
  return `
    <div class="choices">
      <button class="choice-btn" data-choice="rock" onclick="pickChoice('rock')">
        <span class="icon">✊</span><span class="label">Rock</span>
      </button>
      <button class="choice-btn" data-choice="paper" onclick="pickChoice('paper')">
        <span class="icon">✋</span><span class="label">Paper</span>
      </button>
      <button class="choice-btn" data-choice="scissors" onclick="pickChoice('scissors')">
        <span class="icon">✌️</span><span class="label">Scissors</span>
      </button>
    </div>
    <div class="game-status" id="game-status">Pick your move!</div>`;
}

function bindChoiceButtons() {
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => pickChoice(btn.dataset.choice));
  });
}

function renderChoices(disabled) {
  const inner = document.getElementById('game-inner');
  inner.innerHTML = buildChoicesHTML();
  if (disabled) {
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  } else {
    bindChoiceButtons();
  }
}

function pickChoice(choice) {
  if (myChoice) return;
  myChoice = choice;
  send({ type: 'choice', choice });

  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.choice === choice) b.classList.add('selected');
  });

  showGameStatus('Waiting for opponent…', '');
}

function showGameStatus(text, cls) {
  const el = document.getElementById('game-status');
  if (!el) return;
  el.textContent = text;
  el.className = 'game-status' + (cls ? ' ' + cls : '');
}

function updateScores(scores) {
  document.getElementById('score-you').textContent = scores[myIndex];
  document.getElementById('score-opp').textContent = scores[myIndex === 0 ? 1 : 0];
  // update bo3 dots
  const dots = [document.getElementById('dot0'), document.getElementById('dot1'), document.getElementById('dot2')];
  dots.forEach(d => { d.className = 'dot'; });
  const myWins = scores[myIndex], oppWins = scores[myIndex === 0 ? 1 : 0];
  let di = 0;
  for (let i = 0; i < myWins && di < 3; i++) { dots[di++].classList.add('you'); }
  for (let i = 0; i < oppWins && di < 3; i++) { dots[di++].classList.add('opp'); }
}

function updateRound(round) {
  document.getElementById('round-label').textContent = `Round ${round}`;
}

function showResult(msg) {
  const myC = msg.choices[myIndex];
  const oppC = msg.choices[myIndex === 0 ? 1 : 0];
  const result = msg.result;

  let label, cls;
  if (result === 'draw') { label = 'DRAW'; cls = 'draw'; }
  else if ((result === 'p1' && myIndex === 0) || (result === 'p2' && myIndex === 1)) { label = 'YOU WIN!'; cls = 'win'; }
  else { label = 'YOU LOSE'; cls = 'lose'; }

  updateScores(msg.scores);

  document.getElementById('game-inner').innerHTML = `
    <div class="result-overlay bounce">
      <div class="result-icons">
        <span>${ICONS[myC]}</span>
        <span class="result-vs">VS</span>
        <span>${ICONS[oppC]}</span>
      </div>
      <div class="result-text ${cls}">${label}</div>
      <div class="result-sub">${myC} vs ${oppC}</div>
    </div>`;
}

function showGameOver(msg) {
  const won = (msg.winner === 0 && myIndex === 0) || (msg.winner === 1 && myIndex === 1);
  document.getElementById('game-inner').innerHTML = `
    <div class="gameover bounce">
      <div class="gameover-title ${won ? 'win' : 'lose'}">${won ? 'VICTORY!' : 'DEFEAT'}</div>
      <div class="gameover-sub">${won ? 'You won best of 3!' : 'Better luck next time!'}</div>
      <button class="rematch-btn" onclick="requestRematch()">⟳ Rematch</button>
    </div>`;
}

function requestRematch() { send({ type: 'rematch' }); }

function copyCode() {
  navigator.clipboard.writeText(roomCode).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy code'; btn.classList.remove('copied'); }, 2000);
  });
}

document.getElementById('join-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom();
});
</script>
